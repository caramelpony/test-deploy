name: Deploy test-vm

on:
  workflow_dispatch:

jobs:
  deploy:
    name: nixos-anywhere → test-vm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v13

      - uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Build system closure
        run: |
          nix build .#nixosConfigurations.test-vm.config.system.build.toplevel \
            --show-trace \
            -o result

      - name: Reconstruct sops-nix age key
        run: |
          mkdir -p secrets/extra-files/var/lib/sops-nix
          printf '%s\n' "${{ secrets.SOPS_AGE_KEY }}" \
            > secrets/extra-files/var/lib/sops-nix/age.key
          chmod 600 secrets/extra-files/var/lib/sops-nix/age.key

      - name: Deploy via nixos-anywhere
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key

          nix run github:nix-community/nixos-anywhere -- \
            --flake .#test-vm \
            --extra-files secrets/extra-files \
            --ssh-option "StrictHostKeyChecking=accept-new" \
            "root@${{ secrets.TEST_VM_HOST }}"

      - name: Verify Caddy
        run: |
          echo "Waiting 90s for reboot..."
          sleep 90
          curl --fail --max-time 10 http://${{ secrets.TEST_VM_HOST }}/
          echo "→ Caddy responded OK"
